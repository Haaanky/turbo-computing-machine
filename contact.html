<script>
        const collector = document.getElementById('collector');
        const sparks = document.querySelectorAll('.quantum-spark');
        document.addEventListener('mousemove', (e) => {
            collector.style.left = `${e.clientX - 24}px`;
            collector.style.top = `${e.clientY - 24}px`;
            // Simple parallax/attraction for sparks
            sparks.forEach(spark => {
                const rect = spark.getBoundingClientRect();
                const dx = e.clientX - rect.left;
                const dy = e.clientY - rect.top;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 300) {
                    spark.style.setProperty('--mx', `${dx/10}px`);
                    spark.style.setProperty('--my', `${dy/10}px`);
                }
            });
        });
        // Generate more sparks dynamically
        const container = document.getElementById('spark-container');
        for(let i=0; i<30; i++) {
            const s = document.createElement('div');
            s.className = 'quantum-spark';
            s.style.top = Math.random() * 100 + '%';
            s.style.left = Math.random() * 100 + '%';
            s.style.setProperty('--x', (Math.random() * 200 - 100) + 'px');
            s.style.setProperty('--y', (Math.random() * 200 - 100) + 'px');
            s.style.animationDelay = (Math.random() * 5) + 's';
            s.style.animationDuration = (8 + Math.random() * 4) + 's';
            container.appendChild(s);
        }
    </script>
