name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: previews/${{ github.head_ref }}
          keep_files: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const repo = context.repo;
            const previewUrl = `https://${repo.owner}.github.io/${repo.repo}/previews/${branch}/`;

            const comments = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const botComment = comments.data.find(
              c => c.user.type === 'Bot' && c.body.includes('Preview deployment')
            );

            const body = `### Preview deployment\n\nDin branch är tillgänglig för preview:\n\n**${previewUrl}**\n\n*Uppdateras automatiskt vid varje push.*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          BRANCH="${{ github.head_ref }}"
          if [ -d "previews/${BRANCH}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "previews/${BRANCH}"
            git commit -m "Remove preview for ${BRANCH}"
            git push
          else
            echo "No preview directory found for ${BRANCH}, skipping."
          fi
